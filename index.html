<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ビジネスアスリート3本柱</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f7f7f8" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#121214" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="3本柱">
<link rel="apple-touch-icon" href="icon-192.svg">
<style>
  :root {
    --bg: #f7f7f8;
    --surface: #ffffff;
    --text: #1a1a1a;
    --text-muted: #666;
    --border: #e5e5e7;
    --english: #2563eb;
    --training: #ea580c;
    --side: #16a34a;
    --selfcare: #9333ea;
    --accent: #111;
    --cal-0: #ebedf0;
    --cal-1: #c6e48b;
    --cal-2: #7bc96f;
    --cal-3: #239a3b;
    --danger: #dc2626;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #121214;
      --surface: #1e1e22;
      --text: #f0f0f0;
      --text-muted: #999;
      --border: #2e2e34;
      --accent: #fff;
      --cal-0: #2a2a30;
      --cal-1: #0e4429;
      --cal-2: #006d32;
      --cal-3: #26a641;
      --danger: #f87171;
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
    max-width: 600px;
    margin: 0 auto;
    padding: 16px 16px 40px;
    line-height: 1.5;
  }

  header {
    padding: 16px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  h1 { font-size: 1.3rem; margin: 0 0 4px; letter-spacing: 0.02em; }
  #today-date { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 8px; }
  .summary {
    font-size: 1.05rem;
    font-weight: 600;
    padding: 10px 14px;
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--border);
    display: inline-block;
  }

  section { margin-bottom: 8px; }
  h2 {
    font-size: 0.95rem;
    margin: 24px 0 8px;
    padding-left: 10px;
    border-left: 4px solid var(--accent);
    font-weight: 600;
  }
  h2.english { border-color: var(--english); color: var(--english); }
  h2.training { border-color: var(--training); color: var(--training); }
  h2.side { border-color: var(--side); color: var(--side); }
  h2.selfcare { border-color: var(--selfcare); color: var(--selfcare); }
  h2.section-title {
    border-left: none;
    padding-left: 0;
    color: var(--text);
    font-size: 1rem;
    margin-top: 28px;
  }

  ul { list-style: none; padding: 0; margin: 0; }
  li.task {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: background 0.15s;
    position: relative;
  }
  li.task.english { border-left: 4px solid var(--english); }
  li.task.training { border-left: 4px solid var(--training); }
  li.task.side { border-left: 4px solid var(--side); }
  li.task.selfcare { border-left: 4px solid var(--selfcare); }

  label.task-label {
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    min-height: 52px;
    padding: 6px 14px;
    font-size: 1rem;
    user-select: none;
  }
  .label-text { flex: 1; }
  .streak {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 600;
    white-space: nowrap;
  }
  .streak.active { color: #ea580c; }

  input[type="checkbox"].task-cb {
    appearance: none;
    -webkit-appearance: none;
    width: 26px;
    height: 26px;
    min-width: 26px;
    border: 2px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
  }
  input[type="checkbox"].task-cb:checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  input[type="checkbox"].task-cb:checked::after {
    content: "";
    position: absolute;
    left: 7px;
    top: 2px;
    width: 7px;
    height: 14px;
    border: solid var(--bg);
    border-width: 0 3px 3px 0;
    transform: rotate(45deg);
  }
  li.task.english input[type="checkbox"].task-cb:checked { background: var(--english); border-color: var(--english); }
  li.task.training input[type="checkbox"].task-cb:checked { background: var(--training); border-color: var(--training); }
  li.task.side input[type="checkbox"].task-cb:checked { background: var(--side); border-color: var(--side); }
  li.task.selfcare input[type="checkbox"].task-cb:checked { background: var(--selfcare); border-color: var(--selfcare); }

  li.task:has(input.task-cb:checked) { opacity: 0.85; }
  li.task:has(input.task-cb:checked) .label-text { text-decoration: line-through; color: var(--text-muted); }

  .empty-msg {
    color: var(--text-muted);
    font-size: 0.9rem;
    padding: 12px 0;
    text-align: center;
  }

  /* Weekly section */
  .weekly-info {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-left: 8px;
  }

  /* Calendar */
  .calendar {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 4px;
    margin-top: 12px;
  }
  .cal-cell {
    aspect-ratio: 1;
    border-radius: 4px;
    background: var(--cal-0);
    cursor: pointer;
    transition: transform 0.1s;
    border: 1px solid transparent;
  }
  .cal-cell:hover { transform: scale(1.15); }
  .cal-cell.today { border-color: var(--accent); }
  .cal-cell.l1 { background: var(--cal-1); }
  .cal-cell.l2 { background: var(--cal-2); }
  .cal-cell.l3 { background: var(--cal-3); }

  .cal-legend {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 10px;
    justify-content: flex-end;
  }
  .cal-legend .cal-cell {
    width: 12px;
    height: 12px;
    aspect-ratio: auto;
    cursor: default;
  }
  .cal-legend .cal-cell:hover { transform: none; }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
    overflow-y: auto;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 14px;
    padding: 20px;
    max-width: 420px;
    width: 100%;
    border: 1px solid var(--border);
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h3 { margin: 0 0 12px; font-size: 1.05rem; }
  .modal h4 {
    font-size: 0.9rem;
    margin: 18px 0 8px;
    color: var(--text-muted);
    font-weight: 600;
  }
  .modal ul.detail-list { font-size: 0.95rem; }
  .modal ul.detail-list li { padding: 6px 0; background: none; border: none; margin: 0; border-radius: 0; }
  .modal-close {
    margin-top: 16px;
    padding: 10px 16px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }

  /* Management modal */
  .manage-row {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 6px;
  }
  .manage-row input[type="text"] {
    flex: 1;
    min-width: 0;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    font-size: 0.95rem;
    font-family: inherit;
  }
  .manage-row select {
    padding: 8px 6px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    font-size: 0.9rem;
    font-family: inherit;
    max-width: 110px;
  }
  .manage-row button.del {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--danger);
    border-radius: 6px;
    cursor: pointer;
    padding: 6px 10px;
    font-size: 1rem;
    min-height: 38px;
  }
  .manage-row button.del:hover { background: var(--danger); color: white; }
  .add-btn {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border: 1px dashed var(--border);
    background: transparent;
    color: var(--text-muted);
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    font-family: inherit;
  }
  .add-btn:hover { color: var(--text); border-color: var(--text-muted); }

  /* Footer (data management) */
  footer {
    margin-top: 36px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .data-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .data-btn {
    flex: 1;
    min-width: 100px;
    padding: 12px 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    min-height: 44px;
    font-family: inherit;
  }
  .data-btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .data-btn.danger { color: var(--danger); }
  .data-btn.danger.armed { background: var(--danger); color: white; border-color: var(--danger); }
  .data-msg {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 10px;
    min-height: 1.2em;
  }
  .data-msg.error { color: var(--danger); }
  .data-msg.success { color: var(--side); }
</style>
</head>
<body>

<header>
  <h1>ビジネスアスリート3本柱</h1>
  <div id="today-date"></div>
  <div class="summary" id="today-summary"></div>
</header>

<section id="daily-section">
  <div id="daily-content"></div>
</section>

<section id="weekly-section">
  <h2 class="section-title">📅 今週のチェック<span class="weekly-info" id="weekly-label"></span></h2>
  <ul id="weekly-list"></ul>
</section>

<section id="calendar-section">
  <h2 class="section-title">📊 過去30日</h2>
  <div class="calendar" id="calendar"></div>
  <div class="cal-legend">
    <span>少ない</span>
    <span class="cal-cell"></span>
    <span class="cal-cell l1"></span>
    <span class="cal-cell l2"></span>
    <span class="cal-cell l3"></span>
    <span>多い</span>
  </div>
</section>

<footer>
  <h2 class="section-title">⚙️ 設定・データ</h2>
  <div class="data-buttons">
    <button class="data-btn primary" id="btn-manage">項目を編集</button>
    <button class="data-btn" id="btn-export">エクスポート</button>
    <button class="data-btn" id="btn-import">インポート</button>
    <button class="data-btn danger" id="btn-reset">リセット</button>
  </div>
  <input type="file" id="import-file" accept="application/json,.json" style="display:none">
  <div class="data-msg" id="data-msg"></div>
</footer>

<!-- Day detail modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <ul id="modal-body" class="detail-list"></ul>
    <button class="modal-close" id="modal-close">閉じる</button>
  </div>
</div>

<!-- Management modal -->
<div class="modal-backdrop" id="manage-backdrop">
  <div class="modal">
    <h3>📝 項目を編集</h3>
    <p style="font-size:0.8rem;color:var(--text-muted);margin:0 0 12px;">変更は自動保存されます。過去のチェック記録は削除しても残ります。</p>

    <h4>毎日項目</h4>
    <div id="manage-daily"></div>
    <button class="add-btn" id="add-daily">＋ 毎日項目を追加</button>

    <h4>週次項目</h4>
    <div id="manage-weekly"></div>
    <button class="add-btn" id="add-weekly">＋ 週次項目を追加</button>

    <button class="modal-close" id="manage-close">完了</button>
  </div>
</div>

<script>
  const STORAGE_KEY = 'threePillarsTracker';

  const PILLARS = [
    { id: 'english',  emoji: '🇬🇧', label: '英語' },
    { id: 'training', emoji: '💪', label: '筋トレ' },
    { id: 'side',     emoji: '💼', label: '副業' },
    { id: 'selfcare', emoji: '📓', label: 'セルフケア' }
  ];

  const DEFAULT_ITEMS = {
    daily: [
      { id: 'shadowing',  label: 'シャドーイング 30分',         pillar: 'english' },
      { id: 'writing',    label: '英作文・フレーズ暗記 30分',   pillar: 'english' },
      { id: 'training',   label: '筋トレ',                       pillar: 'training' },
      { id: 'protein',    label: 'タンパク質 140g 達成',         pillar: 'training' },
      { id: 'xPost',      label: 'X発信（1投稿以上）',           pillar: 'side' },
      { id: 'journaling', label: 'ジャーナリング',               pillar: 'selfcare' }
    ],
    weekly: [
      { id: 'note',          label: '📝 note 発信' },
      { id: 'facilitation',  label: '🇬🇧 ミーティング録画ファシリ練習（週1時間）' },
      { id: 'weighIn',       label: '⚖️ 体重・体脂肪率を計測' },
      { id: 'bodyPhoto',     label: '📷 体の写真記録' }
    ]
  };

  function pad2(n) { return String(n).padStart(2, '0'); }
  function dateToStr(d) { return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`; }
  function todayStr() { return dateToStr(new Date()); }

  function getISOWeek(date) {
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    const dayNum = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - dayNum);
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    const weekNum = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    return `${d.getUTCFullYear()}-W${pad2(weekNum)}`;
  }

  function genId(prefix) {
    return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 6)}`;
  }

  function loadData() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      return {
        version: '1.1',
        settings: { createdAt: new Date().toISOString() },
        items: JSON.parse(JSON.stringify(DEFAULT_ITEMS)),
        dailyRecords: {},
        weeklyRecords: {}
      };
    }
    const data = JSON.parse(raw);
    if (!data.weeklyRecords) data.weeklyRecords = {};
    if (!data.dailyRecords) data.dailyRecords = {};
    if (!data.items) {
      data.items = JSON.parse(JSON.stringify(DEFAULT_ITEMS));
    }
    if (!Array.isArray(data.items.daily)) data.items.daily = [];
    if (!Array.isArray(data.items.weekly)) data.items.weekly = [];
    data.items.daily.forEach(it => {
      if (!it.pillar || !PILLARS.find(p => p.id === it.pillar)) it.pillar = 'selfcare';
    });
    data.version = '1.1';
    return data;
  }

  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function getDailyKeys(data) { return data.items.daily.map(it => it.id); }
  function getWeeklyKeys(data) { return data.items.weekly.map(it => it.id); }

  function getTodayRecord(data) {
    const key = todayStr();
    if (!data.dailyRecords[key]) data.dailyRecords[key] = {};
    getDailyKeys(data).forEach(k => {
      if (data.dailyRecords[key][k] === undefined) data.dailyRecords[key][k] = false;
    });
    return data.dailyRecords[key];
  }

  function getThisWeekRecord(data) {
    const key = getISOWeek(new Date());
    if (!data.weeklyRecords[key]) data.weeklyRecords[key] = {};
    getWeeklyKeys(data).forEach(k => {
      if (data.weeklyRecords[key][k] === undefined) data.weeklyRecords[key][k] = false;
    });
    return data.weeklyRecords[key];
  }

  function calcCompletion(record, dailyKeys) {
    if (!record || dailyKeys.length === 0) return 0;
    const done = dailyKeys.filter(k => record[k]).length;
    return done / dailyKeys.length;
  }

  function updateSummary(data) {
    const record = getTodayRecord(data);
    const dailyKeys = getDailyKeys(data);
    const done = dailyKeys.filter(k => record[k]).length;
    const total = dailyKeys.length;
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);
    document.getElementById('today-summary').textContent =
      total === 0 ? '項目がありません' : `今日: ${done}/${total} 達成（${pct}%）`;
  }

  function calcStreak(data, key) {
    const today = new Date();
    const todayKey = dateToStr(today);
    const todayRec = data.dailyRecords[todayKey];
    let streak = 0;
    let cursor = new Date(today);
    if (!todayRec || !todayRec[key]) cursor.setDate(cursor.getDate() - 1);
    while (true) {
      const k = dateToStr(cursor);
      const rec = data.dailyRecords[k];
      if (rec && rec[key]) {
        streak++;
        cursor.setDate(cursor.getDate() - 1);
      } else {
        break;
      }
    }
    return streak;
  }

  function renderDailyChecklist(data) {
    const container = document.getElementById('daily-content');
    container.innerHTML = '';
    const record = getTodayRecord(data);

    if (data.items.daily.length === 0) {
      container.innerHTML = '<p class="empty-msg">毎日項目がありません。「項目を編集」から追加してください。</p>';
      return;
    }

    const byPillar = {};
    data.items.daily.forEach(it => {
      if (!byPillar[it.pillar]) byPillar[it.pillar] = [];
      byPillar[it.pillar].push(it);
    });

    PILLARS.forEach(p => {
      const items = byPillar[p.id];
      if (!items || items.length === 0) return;
      const h2 = document.createElement('h2');
      h2.className = p.id;
      h2.textContent = `${p.emoji} ${p.label}`;
      container.appendChild(h2);
      const ul = document.createElement('ul');
      items.forEach(it => {
        const li = document.createElement('li');
        li.className = `task ${p.id}`;
        const label = document.createElement('label');
        label.className = 'task-label';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.className = 'task-cb';
        cb.checked = !!record[it.id];
        cb.addEventListener('change', () => {
          const d = loadData();
          const r = getTodayRecord(d);
          r[it.id] = cb.checked;
          saveData(d);
          updateSummary(d);
          updateStreaks(d);
          renderCalendar(d);
        });
        const text = document.createElement('span');
        text.className = 'label-text';
        text.textContent = it.label;
        const streakSpan = document.createElement('span');
        streakSpan.className = 'streak';
        streakSpan.dataset.streak = it.id;
        label.append(cb, text, streakSpan);
        li.appendChild(label);
        ul.appendChild(li);
      });
      container.appendChild(ul);
    });
  }

  function renderWeeklyChecklist(data) {
    const ul = document.getElementById('weekly-list');
    ul.innerHTML = '';
    const weekRec = getThisWeekRecord(data);

    if (data.items.weekly.length === 0) {
      ul.innerHTML = '<li class="empty-msg" style="background:none;border:none">週次項目がありません</li>';
      return;
    }

    data.items.weekly.forEach(it => {
      const li = document.createElement('li');
      li.className = 'task';
      const label = document.createElement('label');
      label.className = 'task-label';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'task-cb';
      cb.checked = !!weekRec[it.id];
      cb.addEventListener('change', () => {
        const d = loadData();
        const wr = getThisWeekRecord(d);
        wr[it.id] = cb.checked;
        saveData(d);
      });
      const text = document.createElement('span');
      text.className = 'label-text';
      text.textContent = it.label;
      label.append(cb, text);
      li.appendChild(label);
      ul.appendChild(li);
    });
  }

  function updateStreaks(data) {
    document.querySelectorAll('[data-streak]').forEach(el => {
      const key = el.dataset.streak;
      const s = calcStreak(data, key);
      if (s === 0) {
        el.textContent = '🌱';
        el.classList.remove('active');
      } else {
        el.textContent = `🔥 ${s}日`;
        el.classList.add('active');
      }
    });
  }

  function renderCalendar(data) {
    const cal = document.getElementById('calendar');
    cal.innerHTML = '';
    const today = new Date();
    const todayKey = dateToStr(today);
    const dailyKeys = getDailyKeys(data);
    for (let i = 29; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const key = dateToStr(d);
      const rec = data.dailyRecords[key];
      const pct = calcCompletion(rec, dailyKeys);
      const cell = document.createElement('div');
      cell.className = 'cal-cell';
      if (pct >= 1) cell.classList.add('l3');
      else if (pct >= 0.5) cell.classList.add('l2');
      else if (pct > 0) cell.classList.add('l1');
      if (key === todayKey) cell.classList.add('today');
      cell.title = `${key} (${Math.round(pct * 100)}%)`;
      cell.addEventListener('click', () => showDayDetail(key, rec, data));
      cal.appendChild(cell);
    }
  }

  function showDayDetail(dateKey, rec, data) {
    document.getElementById('modal-title').textContent = dateKey;
    const body = document.getElementById('modal-body');
    body.innerHTML = '';
    if (!rec) {
      body.innerHTML = '<li>記録なし</li>';
    } else {
      data.items.daily.forEach(it => {
        const li = document.createElement('li');
        li.textContent = `${rec[it.id] ? '✅' : '⬜️'} ${it.label}`;
        body.appendChild(li);
      });
    }
    document.getElementById('modal-backdrop').classList.add('show');
  }

  function refreshChecklists(data) {
    renderDailyChecklist(data);
    renderWeeklyChecklist(data);
    updateSummary(data);
    updateStreaks(data);
    renderCalendar(data);
  }

  // ---------- Management modal ----------

  function renderManageList() {
    const data = loadData();
    const dailyEl = document.getElementById('manage-daily');
    const weeklyEl = document.getElementById('manage-weekly');
    dailyEl.innerHTML = '';
    weeklyEl.innerHTML = '';

    data.items.daily.forEach(it => {
      dailyEl.appendChild(buildManageRow(it, true));
    });
    data.items.weekly.forEach(it => {
      weeklyEl.appendChild(buildManageRow(it, false));
    });
  }

  function buildManageRow(item, isDaily) {
    const row = document.createElement('div');
    row.className = 'manage-row';
    row.dataset.id = item.id;

    const text = document.createElement('input');
    text.type = 'text';
    text.value = item.label;
    text.placeholder = isDaily ? '毎日のタスク名' : '週次のタスク名';
    text.addEventListener('input', () => updateItemLabel(item.id, text.value, isDaily));
    row.appendChild(text);

    if (isDaily) {
      const sel = document.createElement('select');
      PILLARS.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = `${p.emoji} ${p.label}`;
        if (p.id === item.pillar) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', () => updateItemPillar(item.id, sel.value));
      row.appendChild(sel);
    }

    const del = document.createElement('button');
    del.className = 'del';
    del.textContent = '🗑';
    del.title = '削除';
    del.addEventListener('click', () => {
      if (!confirm(`「${item.label || '(無題)'}」を削除しますか？\n過去のチェック記録は残ります。`)) return;
      deleteItem(item.id, isDaily);
    });
    row.appendChild(del);

    return row;
  }

  function updateItemLabel(id, label, isDaily) {
    const data = loadData();
    const list = isDaily ? data.items.daily : data.items.weekly;
    const it = list.find(x => x.id === id);
    if (!it) return;
    it.label = label;
    saveData(data);
    refreshChecklists(data);
  }

  function updateItemPillar(id, pillar) {
    const data = loadData();
    const it = data.items.daily.find(x => x.id === id);
    if (!it) return;
    it.pillar = pillar;
    saveData(data);
    refreshChecklists(data);
  }

  function deleteItem(id, isDaily) {
    const data = loadData();
    if (isDaily) data.items.daily = data.items.daily.filter(x => x.id !== id);
    else data.items.weekly = data.items.weekly.filter(x => x.id !== id);
    saveData(data);
    renderManageList();
    refreshChecklists(data);
  }

  function addItem(isDaily) {
    const data = loadData();
    if (isDaily) {
      data.items.daily.push({
        id: genId('d'),
        label: '',
        pillar: 'selfcare'
      });
    } else {
      data.items.weekly.push({
        id: genId('w'),
        label: ''
      });
    }
    saveData(data);
    renderManageList();
    refreshChecklists(data);
    // focus the newly added text input
    const list = isDaily ? document.getElementById('manage-daily') : document.getElementById('manage-weekly');
    const lastInput = list.querySelector('.manage-row:last-child input[type="text"]');
    if (lastInput) lastInput.focus();
  }

  function openManageModal() {
    renderManageList();
    document.getElementById('manage-backdrop').classList.add('show');
  }

  // ---------- Data management ----------

  function showMsg(text, kind) {
    const el = document.getElementById('data-msg');
    el.textContent = text;
    el.className = 'data-msg' + (kind ? ' ' + kind : '');
    if (text) {
      clearTimeout(showMsg._t);
      showMsg._t = setTimeout(() => { el.textContent = ''; el.className = 'data-msg'; }, 4000);
    }
  }

  function exportData() {
    const data = loadData();
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `three-pillars-${todayStr()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showMsg('エクスポートしました', 'success');
  }

  function importData(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const parsed = JSON.parse(e.target.result);
        if (!parsed || typeof parsed !== 'object' || !parsed.dailyRecords) {
          throw new Error('不正なファイル形式');
        }
        if (!confirm('現在のデータを上書きします。よろしいですか？')) {
          showMsg('インポートをキャンセルしました');
          return;
        }
        if (!parsed.weeklyRecords) parsed.weeklyRecords = {};
        if (!parsed.items) parsed.items = JSON.parse(JSON.stringify(DEFAULT_ITEMS));
        if (!parsed.version) parsed.version = '1.1';
        if (!parsed.settings) parsed.settings = { createdAt: new Date().toISOString() };
        saveData(parsed);
        showMsg('インポート完了', 'success');
        refreshChecklists(loadData());
      } catch (err) {
        showMsg('読み込み失敗: ' + err.message, 'error');
      }
    };
    reader.readAsText(file);
  }

  function setupDataButtons() {
    document.getElementById('btn-export').addEventListener('click', exportData);

    const fileInput = document.getElementById('import-file');
    document.getElementById('btn-import').addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) importData(file);
      e.target.value = '';
    });

    document.getElementById('btn-manage').addEventListener('click', openManageModal);

    const resetBtn = document.getElementById('btn-reset');
    let armed = false;
    let armTimer = null;
    resetBtn.addEventListener('click', () => {
      if (!armed) {
        armed = true;
        resetBtn.textContent = '本当に削除？(再タップ)';
        resetBtn.classList.add('armed');
        armTimer = setTimeout(() => {
          armed = false;
          resetBtn.textContent = 'リセット';
          resetBtn.classList.remove('armed');
        }, 4000);
        return;
      }
      clearTimeout(armTimer);
      armed = false;
      resetBtn.textContent = 'リセット';
      resetBtn.classList.remove('armed');
      localStorage.removeItem(STORAGE_KEY);
      const data = loadData();
      saveData(data);
      refreshChecklists(data);
      showMsg('全データを初期化しました', 'success');
    });
  }

  // ---------- Init ----------

  function init() {
    const data = loadData();
    saveData(data);

    const now = new Date();
    document.getElementById('today-date').textContent =
      `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日 (${'日月火水木金土'[now.getDay()]})`;
    document.getElementById('weekly-label').textContent = `${getISOWeek(now)}`;

    refreshChecklists(data);
    setupDataButtons();

    // Day detail modal close
    document.getElementById('modal-close').addEventListener('click', () => {
      document.getElementById('modal-backdrop').classList.remove('show');
    });
    document.getElementById('modal-backdrop').addEventListener('click', e => {
      if (e.target.id === 'modal-backdrop') e.currentTarget.classList.remove('show');
    });

    // Manage modal close + add buttons
    document.getElementById('manage-close').addEventListener('click', () => {
      document.getElementById('manage-backdrop').classList.remove('show');
    });
    document.getElementById('manage-backdrop').addEventListener('click', e => {
      if (e.target.id === 'manage-backdrop') e.currentTarget.classList.remove('show');
    });
    document.getElementById('add-daily').addEventListener('click', () => addItem(true));
    document.getElementById('add-weekly').addEventListener('click', () => addItem(false));
  }

  init();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => {
        console.warn('Service Worker registration failed:', err);
      });
    });
  }
</script>

</body>
</html>
